<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Distraction Smash</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #game-container { position: relative; width: 1920px; height: 1080px; background: #05080c; overflow: hidden; transform-origin: center; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 30px; left: 40px; pointer-events: none; z-index: 10; }
        #score-box { font-size: 32px; font-weight: 900; color: #00ffcc; text-shadow: 0 0 15px #00ffcc; }
        #timer { position: absolute; top: 30px; right: 40px; font-size: 48px; font-weight: 900; color: #ff3366; text-shadow: 0 0 15px #ff3366; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; background: rgba(5, 10, 25, 0.98); padding: 60px; border: 4px solid #00ffcc; border-radius: 40px; text-align: center; width: 420px; z-index: 100; box-shadow: 0 0 60px rgba(0,255,204,0.3); }
        #powerup-bar { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 300px; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; display: none; border: 2px solid #ffcc00; }
        #powerup-progress { height: 100%; width: 100%; background: #ffcc00; }
        button { background: #00ffcc; border: none; padding: 20px 60px; font-size: 28px; cursor: pointer; border-radius: 60px; margin-top: 30px; font-weight: bold; color: #05080c; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="ui"><div id="score-box">INTEGRITY: <span id="score">50</span></div></div>
        <div id="timer">60</div>
        <div id="powerup-bar"><div id="powerup-progress"></div></div>
        <div id="msg">
            <h1 id="status-text" style="color: #ff3366; font-size: 40px; margin:0;">OVERLOAD</h1>
            <h2 id="finalScore" style="color: #00ffcc; font-size: 72px; margin: 20px 0;">0</h2>
            <button onclick="location.reload()">RE-SYNC</button>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
const container = document.getElementById('game-container');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer'), msgBox = document.getElementById('msg');
const pBar = document.getElementById('powerup-bar'), pProgress = document.getElementById('powerup-progress');

const GAME_W = 1920, GAME_H = 1080;
canvas.width = GAME_W; canvas.height = GAME_H;

function scaleGame() {
    const scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
    container.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', scaleGame);
scaleGame();

let score = 50, timeLeft = 60, gameActive = true, difficulty = 1;
let bullets = [], enemies = [], stars = [], isHyperFocus = false, hitEffect = 0;

for(let i=0; i<150; i++) stars.push({ x: Math.random()*GAME_W, y: Math.random()*GAME_H, s: 1 + Math.random()*4 });

// Fixed ship starting point
const player = { x: GAME_W / 2, y: GAME_H - 180, w: 120, h: 80 };

const enemyTypes = [
    { label: '☄️', p: 10, penalty: 15 }, { label: '📱', p: 20, penalty: 20 }, 
    { label: '🔔', p: 10, penalty: 10 }, { label: '💡', p: 50, special: 'hyper', penalty: 5 }
];

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = GAME_W / rect.width;
    const x = (e.touches ? e.touches.clientX : e.clientX) - rect.left;
    return x * scaleX;
}

function move(e) {
    if(!gameActive) return;
    const x = getMousePos(e);
    player.x = Math.max(100, Math.min(GAME_W - 100, x));
}
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move);

function spawnBullet() {
    if (!gameActive) return;
    bullets.push({ x: player.x - 5, y: player.y - 40, w: 10, h: 40 });
    setTimeout(spawnBullet, isHyperFocus ? 80 : 250);
}

function spawnEnemy() {
    if (!gameActive) return;
    const type = Math.random() < 0.1 ? enemyTypes[3] : enemyTypes[Math.floor(Math.random() * 3)];
    enemies.push({ x: Math.random() * (GAME_W - 100), y: -100, speed: (5 + Math.random() * 3) * difficulty, type: type });
    setTimeout(spawnEnemy, Math.max(150, 1000 - (60 - timeLeft) * 15));
}

function activateHyperFocus() {
    isHyperFocus = true; pBar.style.display = 'block';
    let end = Date.now() + 5000;
    const timer = setInterval(() => {
        let remain = end - Date.now();
        pProgress.style.width = (remain / 5000 * 100) + '%';
        if (remain <= 0) { isHyperFocus = false; pBar.style.display = 'none'; clearInterval(timer); }
    }, 50);
}

function drawUFO() {
    ctx.save();
    ctx.translate(player.x, player.y);
    
    let mainColor = isHyperFocus ? '#ffcc00' : '#00ffcc';
    if (hitEffect > 0) { mainColor = '#ff3366'; hitEffect--; }

    // 1. UFO Hull (Oval)
    ctx.fillStyle = mainColor;
    ctx.shadowBlur = 30; ctx.shadowColor = mainColor;
    ctx.beginPath();
    ctx.ellipse(0, 10, 60, 25, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. Glass Dome
    ctx.fillStyle = 'rgba(200, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(0, -5, 30, Math.PI, 0);
    ctx.fill();

    // 3. Little Alien (Cute head and eyes)
    ctx.fillStyle = '#32cd32'; 
    ctx.beginPath();
    ctx.ellipse(0, -10, 12, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5, -12, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, -12, 3, 0, Math.PI * 2); ctx.fill();

    // 4. UFO Lights
    const time = Date.now() / 200;
    for(let i=0; i<5; i++) {
        ctx.fillStyle = `hsl(${(time * 50 + i * 70) % 360}, 100%, 70%)`;
        ctx.beginPath();
        ctx.arc(-40 + (i * 20), 15, 4, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();
}

function draw() {
    if (!gameActive) return;
    ctx.fillStyle = '#05080c'; ctx.fillRect(0, 0, GAME_W, GAME_H);

    ctx.fillStyle = '#fff';
    stars.forEach(s => {
        s.y += isHyperFocus ? s.s * 6 : s.s;
        if(s.y > GAME_H) s.y = 0;
        ctx.fillRect(s.x, s.y, 2, 2);
    });

    bullets.forEach((b, i) => {
        b.y -= 25; ctx.fillStyle = isHyperFocus ? '#ffcc00' : '#ff3366';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        if (b.y < -50) bullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        e.y += e.speed; ctx.font = '80px Arial';
        ctx.fillText(e.type.label, e.x, e.y);

        let dist = Math.hypot(e.x - player.x, e.y - player.y);
        if (dist < 70) {
            if(!isHyperFocus) { score -= e.type.penalty; hitEffect = 15; }
            enemies.splice(i, 1);
            if (score <= 0) { score = 0; gameActive = false; msgBox.style.display = 'block'; }
        }

        bullets.forEach((b, bi) => {
            if (b.x < e.x + 70 && b.x + b.w > e.x && b.y < e.y && b.y + b.h > e.y - 60) {
                if(e.type.special === 'hyper') activateHyperFocus();
                score += e.type.p; enemies.splice(i, 1); bullets.splice(bi, 1);
            }
        });
        if (e.y > GAME_H + 100) enemies.splice(i, 1);
    });

    drawUFO();
    scoreEl.innerText = score;
    requestAnimationFrame(draw);
}

const clock = setInterval(() => {
    if(!gameActive) return;
    timeLeft--; timerEl.innerText = timeLeft;
    if (timeLeft <= 0) { 
        gameActive = false; clearInterval(clock); 
        document.getElementById('status-text').innerText = "STABLE";
        document.getElementById('status-text').style.color = "#00ffcc";
        msgBox.style.display = 'block'; 
    }
}, 1000);

spawnBullet(); spawnEnemy(); draw();
</script>
</body>
</html>
